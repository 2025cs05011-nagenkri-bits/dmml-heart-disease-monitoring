name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      demo_fail_on_drift:
        description: "Demo: run drift gate against synthetic drifted data (CI will FAIL)"
        type: boolean
        required: false
        default: false

defaults:
  run:
    working-directory: DMML_Evidently_Demo

jobs:
  test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: DMML_Evidently_Demo/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/ main.py

      - name: Regenerate train/test splits
        run: python -m src.data.prepare

      - name: Train model artifact (so test_model.py has a fresh pickle)
        run: python -m src.training.train

      - name: Run pytest
        run: python -m pytest tests/ --tb=short

      # Compares the committed v1.0.0 reference snapshot against today's
      # regenerated train.csv. Drift here means the raw data file or
      # split logic in src/data/prepare.py has diverged from the
      # baseline the production model was trained on.
      - name: Data profiling & drift detection (Evidently)
        run: |
          python scripts/run_evidently.py \
            --reference data/reference/reference_train_v1.0.0.csv \
            --current   data/processed/train.csv

      # Auxiliary demo: prove the gate visibly fires against synthetic
      # drifted data. Uses --no-fail-on-drift so the build is not
      # blocked; the report is still uploaded as an artifact. Only runs
      # on manual workflow_dispatch to keep regular push/PR logs clean
      # (the real gate above already proves the healthy path is green).
      - name: Drift gate demo (synthetic drifted current)
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.demo_fail_on_drift }}
        run: |
          python scripts/generate_drift_demo.py
          python scripts/run_evidently.py \
            --reference data/reference/reference_train_v1.0.0.csv \
            --current   data/demo/current_drifted.csv \
            --no-fail-on-drift

      # Debug: surface the workflow_dispatch input value in the run log so
      # we can see exactly what the toggle was set to. Helps confirm the
      # conditional below is firing (or explain why it isn't).
      - name: Show workflow inputs (debug)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "event_name           = ${{ github.event_name }}"
          echo "demo_fail_on_drift   = ${{ inputs.demo_fail_on_drift }}"

      # On-demand FAILURE demo. Triggered only via the GitHub Actions UI
      # when "demo_fail_on_drift" is checked. Runs the same drift check
      # WITHOUT --no-fail-on-drift, so CI exits non-zero and the workflow
      # visibly turns red. Use this to demonstrate the gate actually
      # rejecting a build.
      #
      # Note: we rely on truthy evaluation of `inputs.demo_fail_on_drift`
      # instead of `== true` — boolean workflow_dispatch inputs are
      # sometimes stringified ("true"/"false"), which makes the literal
      # `== true` comparison silently false and skips the step.
      - name: Drift gate FAILURE demo (manual trigger only)
        if: ${{ inputs.demo_fail_on_drift }}
        run: |
          echo "::warning::Running CI failure demo - this step is EXPECTED to fail"
          python scripts/generate_drift_demo.py
          python scripts/run_evidently.py \
            --reference data/reference/reference_train_v1.0.0.csv \
            --current   data/demo/current_drifted.csv

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heart-disease-model-py${{ matrix.python-version }}
          path: |
            DMML_Evidently_Demo/models/heart_model.pkl
            DMML_Evidently_Demo/reports/metrics.json
            DMML_Evidently_Demo/reports/figures/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Evidently reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidently-reports-py${{ matrix.python-version }}
          path: DMML_Evidently_Demo/reports/evidently/
          if-no-files-found: warn
          retention-days: 14

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: DMML_Evidently_Demo/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Generate model artifact for image
        run: |
          python -m src.data.prepare
          python -m src.training.train

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: DMML_Evidently_Demo
          file: DMML_Evidently_Demo/Dockerfile
          push: false
          load: true
          tags: heart-disease-api:ci-${{ github.sha }}

      - name: Smoke-test the image
        run: |
          docker run -d --name svc -p 8080:8080 heart-disease-api:ci-${{ github.sha }}
          for i in 1 2 3 4 5; do
            sleep 2
            if curl -fs http://127.0.0.1:8080/health >/dev/null; then
              echo "service is healthy"
              break
            fi
          done
          curl -fs http://127.0.0.1:8080/health
          curl -fs -X POST http://127.0.0.1:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"age":67,"sex":1,"cp":4,"trestbps":160,"chol":286,"fbs":0,
                 "restecg":2,"thalach":108,"exang":1,"oldpeak":1.5,"slope":2,
                 "ca":3,"thal":7}'
          docker rm -f svc
